    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var selectedTag = '';
            
            
            
            var chips = document.querySelectorAll('.filter-chip');
            var cards = document.querySelectorAll('.post-card');
            var tagHeader = document.getElementById('tagHeader');
            var tagName = document.getElementById('selectedTagName');
            var tagCount = document.getElementById('selectedTagCount');
            var tagPostsList = document.getElementById('tagPostsList');
            var emptyState = document.getElementById('emptyState');
            var searchInput = document.getElementById('tagSearchInput');
            
            function updateFilter() {
                var searchVal = searchInput.value.toLowerCase();
                var visibleCount = 0;
                
                cards.forEach(function(card) {
                    var cardTag = card.getAttribute('data-tag');
                    var showCard = (!selectedTag || cardTag === selectedTag);
                    
                    if (searchVal) {
                        showCard = showCard && cardTag.toLowerCase().includes(searchVal);
                    }
                    
                    card.style.display = showCard ? 'block' : 'none';
                    if (showCard) visibleCount++;
                });
                
                chips.forEach(function(chip) {
                    var chipTag = chip.getAttribute('data-tag');
                    var showChip = !searchVal || chipTag.toLowerCase().includes(searchVal) || chipTag === '';
                    chip.style.display = showChip ? 'inline-block' : 'none';
                });
                
                chips.forEach(function(chip) {
                    chip.classList.remove('active');
                    if (chip.getAttribute('data-tag') === selectedTag) {
                        chip.classList.add('active');
                    }
                });
                
                if (selectedTag) {
                    tagName.textContent = selectedTag;
                } else {
                    tagName.textContent = '全部文章';
                }
                tagCount.textContent = '共 ' + visibleCount + ' 篇文章';
                tagHeader.style.display = 'flex';
                
                emptyState.style.display = visibleCount === 0 ? 'flex' : 'none';
                tagPostsList.style.display = visibleCount > 0 ? 'block' : 'none';
            }
            
            chips.forEach(function(chip) {
                chip.addEventListener('click', function() {
                    selectedTag = this.getAttribute('data-tag');
                    updateFilter();
                });
            });
            
            searchInput.addEventListener('input', function() {
                updateFilter();
            });
            
            updateFilter();
        });
    </script>
